name: iADB
options:
  bundleIdPrefix: com.iadb
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  projectFormatVersion: "56"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    minorVersion: "1.17.0"
  swift-case-paths:
    url: https://github.com/pointfreeco/swift-case-paths
    from: "1.5.4"
  swift-dependencies:
    url: https://github.com/pointfreeco/swift-dependencies
    from: "1.4.0"
  swift-concurrency-extras:
    url: https://github.com/pointfreeco/swift-concurrency-extras
    from: "1.2.0"
  xctest-dynamic-overlay:
    url: https://github.com/pointfreeco/xctest-dynamic-overlay
    from: "1.3.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_NO_COMMON_BLOCKS: YES
    CLANG_ENABLE_MODULES: YES
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  iADB:
    type: application
    platform: iOS
    sources:
      - path: iADB
        excludes:
          - "**/*.xcassets/**/.*"
    settings:
      base:
        INFOPLIST_FILE: iADB/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.iadb.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: ""
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
    dependencies:
      - package: ComposableArchitecture
      - package: swift-case-paths
        product: CasePaths
      - package: swift-dependencies
        product: Dependencies
      - package: swift-concurrency-extras
        product: ConcurrencyExtras
      - package: xctest-dynamic-overlay
        product: XCTestDynamicOverlay

  iADBTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: iADBTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iadb.tests
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - target: iADB
      - package: ComposableArchitecture

schemes:
  iADB:
    build:
      targets:
        iADB: all
        iADBTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - iADBTests
    archive:
      config: Release
