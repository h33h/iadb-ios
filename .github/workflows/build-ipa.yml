name: Build IPA

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: ''
        type: string

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          brew install xcodegen
          xcodegen generate

      - name: Build Release & Package IPA
        run: |
          set -o pipefail
          xcodebuild build \
            -project iADB.xcodeproj \
            -scheme iADB \
            -configuration Release \
            -sdk iphoneos \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Release-iphoneos/iADB.app" -type d | head -1)
          [ -z "$APP_PATH" ] && echo "ERROR: iADB.app not found" && exit 1
          mkdir -p Payload && cp -r "$APP_PATH" Payload/
          zip -r -9 iADB-unsigned.ipa Payload/ && rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iADB-unsigned
          path: iADB-unsigned.ipa
          retention-days: 30
