name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          brew install xcodegen
          xcodegen generate

      - name: Select simulator
        id: test-setup
        run: |
          SIM_DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          best = None
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime: continue
              m = re.search(r'(\d+)[-.](\d+)', runtime)
              if not m: continue
              ver = (int(m.group(1)), int(m.group(2)))
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      if best is None or ver > best[0]:
                          best = (ver, d['name'], d['udid'])
          print(f'platform=iOS Simulator,id={best[2]}' if best else 'platform=iOS Simulator')
          ")
          echo "destination=$SIM_DEST" >> "$GITHUB_OUTPUT"

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project iADB.xcodeproj \
            -scheme iADB \
            -destination '${{ steps.test-setup.outputs.destination }}' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Release & Package IPA
        run: |
          set -o pipefail
          xcodebuild build \
            -project iADB.xcodeproj \
            -scheme iADB \
            -configuration Release \
            -sdk iphoneos \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM=""

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Release-iphoneos/iADB.app" -type d | head -1)
          [ -z "$APP_PATH" ] && echo "ERROR: iADB.app not found" && exit 1
          mkdir -p Payload && cp -r "$APP_PATH" Payload/
          zip -r -9 iADB-unsigned.ipa Payload/ && rm -rf Payload

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: iADB-unsigned.ipa
          generate_release_notes: true
