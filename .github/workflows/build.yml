name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        id: setup
        run: |
          # Select latest Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

          # Install XcodeGen & generate project
          brew install xcodegen
          xcodegen generate

          # Find best simulator
          SIM_DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          best = None
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime: continue
              m = re.search(r'(\d+)[-.](\d+)', runtime)
              if not m: continue
              ver = (int(m.group(1)), int(m.group(2)))
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      if best is None or ver > best[0]:
                          best = (ver, d['name'], d['udid'])
          print(f'platform=iOS Simulator,id={best[2]}' if best else 'platform=iOS Simulator,name=iPhone 16')
          ")
          echo "destination=$SIM_DEST" >> "$GITHUB_OUTPUT"

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project iADB.xcodeproj \
            -scheme iADB \
            -destination '${{ steps.setup.outputs.destination }}' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test.log

      - name: Show errors
        if: failure()
        run: grep -E "error:|Test Case.*failed" test.log 2>/dev/null | head -50 || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore

      - name: Build Release & Package IPA
        run: |
          set -o pipefail
          xcodebuild build \
            -project iADB.xcodeproj \
            -scheme iADB \
            -configuration Release \
            -sdk iphoneos \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log | xcpretty --color

          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Release-iphoneos/iADB.app" -type d | head -1)
          [ -z "$APP_PATH" ] && echo "ERROR: iADB.app not found" && exit 1
          mkdir -p Payload && cp -r "$APP_PATH" Payload/
          zip -r -9 iADB-unsigned.ipa Payload/ && rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iADB-unsigned
          path: iADB-unsigned.ipa
          retention-days: 30
