name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications/ | grep Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project iADB.xcodeproj \
            -scheme iADB \
            -skipMacroValidation \
            -skipPackagePluginValidation

      - name: Find Simulator
        id: sim
        run: |
          SIM_DEST=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys, re
          data = json.load(sys.stdin)
          best = None
          for runtime, devices in data['devices'].items():
              if 'iOS' not in runtime:
                  continue
              m = re.search(r'(\d+)[-.](\d+)', runtime)
              if not m:
                  continue
              ver = (int(m.group(1)), int(m.group(2)))
              for d in devices:
                  if 'iPhone' in d['name'] and d['isAvailable']:
                      if best is None or ver > best[0] or (ver == best[0] and d['name'] > best[1]):
                          best = (ver, d['name'], d['udid'])
          if best:
              print(f'platform=iOS Simulator,id={best[2]}')
          else:
              print('platform=iOS Simulator,name=iPhone 16')
          ")
          echo "destination=$SIM_DEST" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $SIM_DEST"

      - name: Build for Testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project iADB.xcodeproj \
            -scheme iADB \
            -destination '${{ steps.sim.outputs.destination }}' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build-test.log
          echo "Test build succeeded"

      - name: Show build errors
        if: failure()
        run: |
          echo "::group::Compilation errors"
          grep -E "error:" build-test.log | grep -v "warning:" | head -100 || true
          echo "::endgroup::"

      - name: Run Tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project iADB.xcodeproj \
            -scheme iADB \
            -destination '${{ steps.sim.outputs.destination }}' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test-run.log
          echo "Tests passed"

      - name: Show test failures
        if: failure()
        run: |
          echo "::group::Test errors"
          grep -E "error:" test-run.log 2>/dev/null | head -50 || true
          echo "::endgroup::"
          echo "::group::Failed tests"
          grep -E "Test Case.*failed|Executed.*with.*failure" test-run.log 2>/dev/null | head -20 || true
          echo "::endgroup::"

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
          if-no-files-found: ignore

      - name: Build Release (unsigned)
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild build \
            -project iADB.xcodeproj \
            -scheme iADB \
            -configuration Release \
            -sdk iphoneos \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build/xcodebuild.log | xcpretty --color

      - name: Show release build errors
        if: failure()
        run: |
          echo "::group::Build errors"
          grep -E "error:" build/xcodebuild.log | grep -v "warning:" | head -100 || true
          echo "::endgroup::"

      - name: Create Unsigned IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Release-iphoneos/iADB.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: iADB.app not found"
            exit 1
          fi
          echo "Found .app at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r -9 iADB-unsigned.ipa Payload/
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iADB-unsigned
          path: build/iADB-unsigned.ipa
          retention-days: 30
